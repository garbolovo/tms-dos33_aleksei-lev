- name: Install Docker CE + Compose v2 plugin (official Docker repo)
  hosts: vms
  become: true
  tasks:
    - name: Remove distro Docker packages if present (avoid conflicts)
      apt:
        name:
          - docker.io
          - docker-compose
          - docker-compose-v2
        state: absent
      ignore_errors: true

    - name: Install prerequisites for Docker repo
      apt:
        name:
          - ca-certificates
          - curl
          - gnupg
        update_cache: yes
        state: present

    - name: Ensure /etc/apt/keyrings exists
      file:
        path: /etc/apt/keyrings
        state: directory
        mode: "0755"

    - name: Download Docker GPG key (ascii armored)
      get_url:
        url: https://download.docker.com/linux/ubuntu/gpg
        dest: /etc/apt/keyrings/docker.asc
        mode: "0644"

    - name: Add Docker apt repository
      apt_repository:
        repo: >-
          deb [arch={{ ansible_architecture | replace('x86_64','amd64') }}
          signed-by=/etc/apt/keyrings/docker.asc]
          https://download.docker.com/linux/ubuntu
          {{ ansible_distribution_release }} stable
        filename: docker
        state: present

    - name: Install Docker CE + Compose plugin
      apt:
        name:
          - docker-ce
          - docker-ce-cli
          - containerd.io
          - docker-buildx-plugin
          - docker-compose-plugin
        update_cache: yes
        state: present

    - name: Enable and start docker
      systemd:
        name: docker
        enabled: true
        state: started

    - name: Add remote user to docker group (so docker works without sudo after re-login)
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: true

    - name: Verify docker + compose versions
      command: bash -lc "docker --version && docker compose version"
      register: docker_versions
      changed_when: false

    - debug:
        var: docker_versions.stdout
